# ============================================================
# STEP 3 — CoC + Point Shrink + Hamming Distance
# Mục tiêu: thay Cosine Similarity bằng Hamming (XNOR-Bitcount)
#           Đo: BOPs vs FLOPs, accuracy có giữ được không?
# ============================================================
model: coc_baseline
epochs: 200
lr: 0.001
optimizer: adamw
scheduler: cosine
warmup_epochs: 5

use_point_shrink: true
use_hamming: true
use_linear_bottleneck: false
use_channel_shuffle: false

shrink_k: 8

result_file: results/step3_coc_hamming.json
